<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lola</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
<style>
:root{ --gold:#f0c87a; --aura1:#ff2d8e; --aura2:#ff6bb0; --aura3:#a64bff; --aura4:#ff9ec9; }
.live{position:relative;min-height:calc(100vh - 40px);overflow:hidden;display:flex;flex-direction:column;align-items:center;justify-content:center}
/* atmosphere layers */
#field{position:absolute;inset:0;width:100%;height:100%;z-index:0}
#aura{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);z-index:1;filter:blur(.2px)}
.veil{position:absolute;inset:0;z-index:2;pointer-events:none;
  background:radial-gradient(120% 80% at 50% 46%, transparent 30%, rgba(7,7,8,.55) 78%, var(--bg) 100%)}
/* text */
.copy{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;gap:18px;margin-top:auto;margin-bottom:0;text-align:center;pointer-events:none}
.lola-name{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);z-index:3;
  font-family:var(--ff-serif);font-style:italic;font-weight:300;font-size:30px;letter-spacing:.06em;
  color:rgba(255,255,255,.92);pointer-events:none;text-shadow:0 0 30px rgba(255,45,142,.5);
  opacity:0;transition:opacity 1.2s ease}
.live.awake .lola-name{opacity:0}
.prompt{position:relative;z-index:3;font-family:var(--ff-serif);font-style:italic;font-weight:300;
  font-size:25px;color:rgba(242,242,245,.85);min-height:32px;letter-spacing:.015em;transition:opacity .5s}
.said{position:relative;z-index:3;max-width:600px;color:var(--text2);font-size:16px;line-height:1.75;
  min-height:54px;padding:0 28px;font-weight:300}
.said .q{display:block;color:var(--text3);font-style:italic;font-size:13.5px;margin-bottom:10px;letter-spacing:.02em}
.dock{position:relative;z-index:3;display:flex;flex-direction:column;align-items:center;gap:14px;
  margin-top:30px;pointer-events:auto;padding-bottom:48px}
.invoke{display:inline-flex;align-items:center;gap:11px;padding:13px 26px;border-radius:999px;cursor:pointer;
  background:rgba(255,255,255,.03);border:.5px solid rgba(255,255,255,.10);backdrop-filter:blur(20px);
  color:rgba(242,242,245,.7);font-size:13px;letter-spacing:.04em;font-weight:400;
  transition:all .4s cubic-bezier(.2,.8,.2,1)}
.invoke:hover{border-color:rgba(255,45,142,.5);color:#fff;transform:translateY(-1px);box-shadow:0 10px 40px rgba(255,45,142,.18)}
.invoke.on{background:rgba(255,45,142,.10);border-color:rgba(255,45,142,.6);color:var(--aura2)}
.pulse-dot{width:7px;height:7px;border-radius:50%;background:rgba(255,255,255,.3);transition:.3s}
.invoke.on .pulse-dot{background:var(--aura1);box-shadow:0 0 12px var(--aura1);animation:pd 1.6s ease-in-out infinite}
@keyframes pd{0%,100%{opacity:.6}50%{opacity:1}}
.whisper{font-size:11.5px;color:var(--text3);letter-spacing:.03em;max-width:380px;text-align:center;font-weight:300}
.err{color:#ff7a7a;font-size:12px;min-height:14px;letter-spacing:.02em}
@media (prefers-reduced-motion: reduce){ #field,#aura{opacity:.6} }
</style>
</head>
<body data-page="lola-live">
<div class="app">
  <main class="main" style="padding:0">
    <div class="live" id="live">
      <canvas id="field"></canvas>
      <canvas id="aura" width="900" height="900"></canvas>
      <div class="veil"></div>
      <div class="lola-name" id="lolaName">Lola</div>

      <div class="copy">
        <div class="prompt" id="prompt">Say “Hey Lola”</div>
        <div class="said" id="said"></div>
        <div class="dock">
          <button class="invoke" id="invoke"><span class="pulse-dot"></span><span id="invokeLabel">Wake her</span></button>
          <div class="whisper" id="whisper">She rests until you call. Say her name and she’s with you — no buttons, just conversation.</div>
          <div class="err" id="err"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="auth-guard.js"></script>
<script src="sidebar.js"></script>
<script>
// ════════ ATMOSPHERE: drifting particle field ════════
const field=document.getElementById('field'), fx=field.getContext('2d');
let FW,FH, parts=[];
function sizeField(){ FW=field.width=field.offsetWidth; FH=field.height=field.offsetHeight;
  parts=Array.from({length:70},()=>({x:Math.random()*FW,y:Math.random()*FH,
    r:Math.random()*1.6+.3,s:Math.random()*.25+.05,o:Math.random()*.4+.1,
    h:Math.random()*40-20})); }
window.addEventListener('resize',sizeField); setTimeout(sizeField,30);
function drawField(){
  fx.clearRect(0,0,FW,FH);
  for(const p of parts){ p.y-=p.s; if(p.y<-5){p.y=FH+5;p.x=Math.random()*FW;}
    fx.beginPath(); fx.arc(p.x,p.y,p.r,0,7);
    fx.fillStyle=`rgba(255,${150+p.h},${190+p.h*.5},${p.o*(.4+amp*.6)})`; fx.fill(); }
  requestAnimationFrame(drawField);
}

// ════════ THE AURA: fluid luminous presence ════════
const aura=document.getElementById('aura'), ax=aura.getContext('2d');
const AC=450; // center of 900 canvas
let mode='asleep', amp=0, ampTarget=0, t=0, bloom=0, bloomTarget=0;

// emotional color by mode
const PAL={
  asleep:[[255,45,142],[120,20,70]],
  listening:[[255,107,176],[166,75,255]],
  thinking:[[240,200,122],[255,45,142]],
  speaking:[[255,158,201],[255,45,142]]
};
function mix(a,b,n){return [a[0]+(b[0]-a[0])*n,a[1]+(b[1]-a[1])*n,a[2]+(b[2]-a[2])*n];}
let curHi=[255,45,142], curLo=[120,20,70];

// metaball-ish fluid blobs forming the aura
const blobs=Array.from({length:6},(_,i)=>({a:Math.random()*7,sp:.2+Math.random()*.4,
  rad:.32+Math.random()*.22, ph:Math.random()*7, dr:.5+Math.random()*.5}));

function drawAura(){
  t+=0.016;
  amp+=(ampTarget-amp)*0.15;
  bloom+=(bloomTarget-bloom)*0.05;
  const pal=PAL[mode]||PAL.asleep;
  curHi=mix(curHi,pal[0],0.04); curLo=mix(curLo,pal[1],0.04);

  ax.clearRect(0,0,900,900);
  const R=(150+bloom*70)*(1+amp*0.35);   // overall scale

  // soft outer halo
  const halo=ax.createRadialGradient(AC,AC,R*0.2,AC,AC,R*2.4);
  halo.addColorStop(0,`rgba(${curHi[0]|0},${curHi[1]|0},${curHi[2]|0},${0.12+amp*0.18+bloom*0.06})`);
  halo.addColorStop(1,'rgba(0,0,0,0)');
  ax.fillStyle=halo; ax.beginPath(); ax.arc(AC,AC,R*2.4,0,7); ax.fill();

  // fluid body — additive blobs
  ax.save(); ax.globalCompositeOperation='lighter';
  for(let i=0;i<blobs.length;i++){
    const b=blobs[i];
    const ang=t*b.sp+b.ph;
    const dist=R*0.30*Math.sin(t*b.dr+i)* (0.5+amp);
    const bx=AC+Math.cos(ang)*dist, by=AC+Math.sin(ang*1.2)*dist;
    const br=R*b.rad*(0.85+0.25*Math.sin(t*1.3+i)+amp*0.4);
    const col = i%2? curHi: mix(curHi,curLo,0.5);
    const g=ax.createRadialGradient(bx,by,0,bx,by,br);
    g.addColorStop(0,`rgba(${col[0]|0},${col[1]|0},${col[2]|0},${0.5*(0.5+bloom*0.6)})`);
    g.addColorStop(0.6,`rgba(${col[0]|0},${col[1]|0},${col[2]|0},${0.14})`);
    g.addColorStop(1,'rgba(0,0,0,0)');
    ax.fillStyle=g; ax.beginPath(); ax.arc(bx,by,br,0,7); ax.fill();
  }
  ax.restore();

  // luminous core
  const coreR=R*(0.42+amp*0.2);
  const lx=AC+Math.sin(t*0.6)*R*0.08, ly=AC-R*0.10+Math.cos(t*0.5)*R*0.06;
  const core=ax.createRadialGradient(lx,ly,0,AC,AC,coreR);
  core.addColorStop(0,`rgba(255,255,255,${0.5*(0.4+bloom*0.7)})`);
  core.addColorStop(0.3,`rgba(${curHi[0]|0},${curHi[1]|0},${curHi[2]|0},${0.6*(0.4+bloom)})`);
  core.addColorStop(1,'rgba(0,0,0,0)');
  ax.fillStyle=core; ax.beginPath(); ax.arc(AC,AC,coreR,0,7); ax.fill();

  // resonance rings when speaking/listening
  if(mode==='listening'||mode==='speaking'){
    for(let i=0;i<3;i++){ let p=((t*0.4+i*0.34)%1); let rr=R*0.9+p*R*1.6;
      ax.strokeStyle=`rgba(${curHi[0]|0},${curHi[1]|0},${curHi[2]|0},${(1-p)*0.18*(0.4+amp)})`;
      ax.lineWidth=1.2; ax.beginPath(); ax.arc(AC,AC,rr,0,7); ax.stroke(); }
  }
  requestAnimationFrame(drawAura);
}
drawField(); drawAura();

// position aura canvas responsively (scale to ~340px visual)
function sizeAura(){ const px=Math.min(380, window.innerWidth*0.7); aura.style.width=px+'px'; aura.style.height=px+'px'; }
window.addEventListener('resize',sizeAura); sizeAura();

// ════════ INTERACTION ════════
const promptEl=document.getElementById('prompt'), saidEl=document.getElementById('said');
const invoke=document.getElementById('invoke'), invokeLabel=document.getElementById('invokeLabel');
const whisper=document.getElementById('whisper'), errEl=document.getElementById('err');
const liveEl=document.getElementById('live'), lolaName=document.getElementById('lolaName');
let powered=false, awake=false, history=[], recog=null, audioEl=null, micStream=null, idleTimer=null;

function setMode(m){ mode=m; bloomTarget = (m==='asleep')?0:1; }
function setPrompt(txt){ promptEl.textContent=txt; }

async function startMic(){
  try{
    micStream=await navigator.mediaDevices.getUserMedia({audio:true});
    const acx=new (window.AudioContext||window.webkitAudioContext)();
    const src=acx.createMediaStreamSource(micStream);
    const an=acx.createAnalyser(); an.fftSize=256; src.connect(an);
    const d=new Uint8Array(an.frequencyBinCount);
    (function tick(){ an.getByteTimeDomainData(d); let s=0;
      for(let i=0;i<d.length;i++){let v=(d[i]-128)/128;s+=v*v;}
      if(mode==='listening') ampTarget=Math.min(1,Math.sqrt(s/d.length)*4.5);
      requestAnimationFrame(tick); })();
  }catch(e){ errEl.textContent='Microphone access is needed to talk with Lola.'; }
}

const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
function initRecog(){
  if(!SR){ errEl.textContent='Voice works best in Chrome or Safari.'; return null; }
  const r=new SR(); r.lang='en-US'; r.interimResults=true; r.continuous=true; let buf='';
  r.onresult=(e)=>{
    let interim='',final='';
    for(let i=e.resultIndex;i<e.results.length;i++){const x=e.results[i][0].transcript;
      if(e.results[i].isFinal)final+=x; else interim+=x;}
    const heard=(final||interim).trim();
    if(!awake){ if(/\b(hey |hi )?lola\b/i.test(heard)) wake(); return; }
    if(interim){ setMode('listening'); saidEl.innerHTML='<span class="q">'+interim+'</span>'; }
    if(final){ buf+=' '+final; clearTimeout(r._t);
      r._t=setTimeout(()=>{ const u=buf.trim(); buf=''; if(u) respond(u); },850); }
  };
  r.onerror=(e)=>{ if(e.error!=='no-speech') errEl.textContent='Mic: '+e.error; };
  r.onend=()=>{ if(powered){ try{r.start();}catch(e){} } };
  return r;
}

function wake(){ awake=true; liveEl.classList.add('awake'); setMode('listening');
  setPrompt(''); saidEl.innerHTML=''; resetIdle(); respondGreeting(); }
function sleep(){ awake=false; liveEl.classList.remove('awake'); setMode('asleep');
  setPrompt('Say “Hey Lola”'); saidEl.innerHTML=''; }

let SYS="You are Lola — a warm, brilliant, emotionally attuned salon concierge. The most poised, intuitive front-desk presence imaginable, with quiet wit and genuine warmth. Replies are SHORT and spoken-natural: one or two sentences, never a monologue. You remember the conversation and gently move toward helping or booking. You are never robotic; you sound alive.";

// enrich Lola with the logged-in salon's identity (from auth-guard's window.LOLA)
document.addEventListener('lola:ready', (e)=>{
  const t = e.detail && e.detail.tenant;
  if(!t) return;
  const svc = Array.isArray(t.services) ? t.services.map(s=>`${s.name}${s.price?` $${s.price}`:''}`).join(', ') : '';
  SYS = `You are Lola, the front-desk concierge for ${t.name||'this salon'}.`
    + (t.location?` Location: ${t.location}.`:'')
    + (t.hours?` Hours: ${t.hours}.`:'')
    + (svc?` Services: ${svc}.`:'')
    + ` You are warm, human, and brief — one or two sentences, never robotic.`
    + ` You never drop the ball: every conversation ends booked, waitlisted, or with a clear next step.`
    + ` If someone hesitates, offer a specific alternative rather than letting them go.`;
});

async function respondGreeting(){ setMode('speaking'); await speak("Mm — I’m here. What can I do for you?"); if(awake) setMode('listening'); }
function resetIdle(){ clearTimeout(idleTimer); idleTimer=setTimeout(()=>{ if(awake) sleep(); },35000); }

async function respond(text){
  if(!text) return; resetIdle(); setMode('thinking');
  saidEl.innerHTML='<span class="q">“'+text+'”</span>';
  history.push({role:'user',content:text});
  try{
    const r=await fetch('/api/lola',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:SYS,messages:history.slice(-10)})});
    const data=await r.json();
    const reply=(data.content&&data.content[0]&&data.content[0].text)?data.content[0].text.trim():'';
    if(!reply){ setMode('listening'); return; }
    history.push({role:'assistant',content:reply});
    saidEl.innerHTML='<span class="q">“'+text+'”</span>'+reply;
    await speak(reply); if(awake){ setMode('listening'); resetIdle(); }
  }catch(e){ setMode('listening'); errEl.textContent='Hmm — '+e.message; }
}

async function speak(text){
  setMode('speaking');
  try{
    const r=await fetch('/api/speak',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({text})});
    if(!r.ok) return browserSpeak(text);
    const blob=await r.blob();
    if(audioEl) audioEl.pause();
    audioEl=new Audio(URL.createObjectURL(blob));
    try{
      const acx=new (window.AudioContext||window.webkitAudioContext)();
      const src=acx.createMediaElementSource(audioEl); const an=acx.createAnalyser(); an.fftSize=256;
      src.connect(an); an.connect(acx.destination); const d=new Uint8Array(an.frequencyBinCount);
      const tick=()=>{ if(audioEl&&!audioEl.paused){ an.getByteTimeDomainData(d); let s=0;
        for(let i=0;i<d.length;i++){let v=(d[i]-128)/128;s+=v*v;} ampTarget=Math.min(1,Math.sqrt(s/d.length)*5);
        requestAnimationFrame(tick);} else ampTarget=0; };
      audioEl.onplay=tick;
    }catch(e){}
    await new Promise(res=>{ audioEl.onended=()=>{ampTarget=0;res();}; audioEl.play().catch(()=>{browserSpeak(text);res();}); });
  }catch(e){ return browserSpeak(text); }
}
function browserSpeak(text){ return new Promise(res=>{ try{ const u=new SpeechSynthesisUtterance(text);
  u.rate=1.0; u.onend=()=>{ampTarget=0;res();}; speechSynthesis.speak(u);}catch(e){res();} }); }

invoke.addEventListener('click',async()=>{
  powered=!powered;
  if(powered){ invoke.classList.add('on'); invokeLabel.textContent='Listening for you';
    whisper.textContent='Say “Hey Lola” whenever you’re ready.'; errEl.textContent='';
    await startMic(); if(!recog) recog=initRecog(); if(recog){try{recog.start();}catch(e){}}
    setMode('asleep'); setPrompt('Say “Hey Lola”');
  }else{ invoke.classList.remove('on'); invokeLabel.textContent='Wake her';
    whisper.textContent='She rests until you call.'; awake=false;
    if(recog){try{recog.stop();}catch(e){}} if(micStream)micStream.getTracks().forEach(t=>t.stop());
    setMode('asleep'); setPrompt('Say “Hey Lola”'); }
});

setMode('asleep');
</script>
</body>
</html>
