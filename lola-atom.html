<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Lola — Command</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
<style>
.cmd{display:grid;grid-template-columns:1fr 1.3fr 1fr;gap:24px;min-height:calc(100vh - 40px);padding:20px}
@media(max-width:1100px){.cmd{grid-template-columns:1fr}}
.col{display:flex;flex-direction:column;gap:16px}
.col.center{align-items:center;justify-content:center;position:relative}
.card{background:var(--surface);border:.5px solid var(--border);border-radius:var(--r-lg);padding:18px 20px}
.card h3{font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:var(--text3);margin-bottom:14px;font-weight:500}

/* ATOM */
.atom-stage{position:relative;width:360px;height:360px;display:flex;align-items:center;justify-content:center;cursor:pointer}
canvas#atom{position:absolute;inset:0;width:360px;height:360px}
.atom-label{position:relative;z-index:2;text-align:center;pointer-events:none;margin-top:300px}
.atom-state{font-family:var(--ff-serif);font-style:italic;font-weight:300;font-size:23px;color:var(--text);transition:.4s}
.atom-sub{font-size:12px;color:var(--text3);margin-top:4px;letter-spacing:.02em}
.ask{margin-top:18px;display:inline-flex;align-items:center;gap:10px;padding:12px 24px;border-radius:999px;
  background:rgba(255,45,142,.1);border:.5px solid rgba(255,45,142,.4);color:var(--pink2);cursor:pointer;
  font-size:13px;letter-spacing:.03em;transition:.3s;pointer-events:auto;z-index:3;position:relative}
.ask:hover{background:rgba(255,45,142,.18);transform:translateY(-1px)}

/* feed */
.evt{display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:.5px solid var(--border)}
.evt:last-child{border-bottom:none}
.evt .ic{width:32px;height:32px;border-radius:9px;background:var(--pink-dim);display:flex;align-items:center;justify-content:center;color:var(--pink2);flex-shrink:0}
.evt .tx{flex:1;min-width:0}
.evt .tt{font-size:13.5px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.evt .wn{font-size:11px;color:var(--text3);margin-top:1px}
.evt.fresh{animation:flashIn .8s ease}
@keyframes flashIn{0%{background:var(--pink-dim);transform:translateX(-6px);opacity:0}100%{background:transparent;transform:none;opacity:1}}

/* insights */
.insight{display:flex;gap:11px;padding:13px 14px;border-radius:12px;background:var(--surface2);border:.5px solid var(--border);margin-bottom:10px}
.insight .b{width:6px;border-radius:3px;flex-shrink:0}
.insight.warn .b{background:#ffb020;box-shadow:0 0 8px rgba(255,176,32,.5)}
.insight.info .b{background:var(--pink);box-shadow:0 0 8px var(--pink-glow)}
.insight p{font-size:13.5px;line-height:1.5;color:var(--text2)}
.kpis{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kpi{background:var(--surface2);border-radius:12px;padding:12px;text-align:center}
.kpi .v{font-size:22px;font-weight:300;color:var(--text)}
.kpi .l{font-size:10px;color:var(--text3);margin-top:2px;letter-spacing:.04em}
</style>
</head>
<body data-page="overview">
<div class="app">
  <main class="main" style="padding:0">
    <div class="cmd">
      <!-- LEFT: live feed -->
      <div class="col">
        <div class="card">
          <h3>Live activity</h3>
          <div id="feed"></div>
        </div>
        <div class="card">
          <h3>Today</h3>
          <div class="kpis">
            <div class="kpi"><div class="v" id="kB">—</div><div class="l">BOOKINGS</div></div>
            <div class="kpi"><div class="v" id="kC">—</div><div class="l">CALLS</div></div>
            <div class="kpi"><div class="v" id="kL">—</div><div class="l">LEADS</div></div>
          </div>
        </div>
      </div>

      <!-- CENTER: the living atom -->
      <div class="col center">
        <div class="atom-stage" id="stage" title="Tap or say Hey Lola">
          <canvas id="atom" width="720" height="720"></canvas>
          <div class="atom-label">
            <div class="atom-state" id="atomState">Lola is listening</div>
            <div class="atom-sub" id="atomSub">all systems live</div>
          </div>
        </div>
        <button class="ask" id="ask"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2M12 19v4"/></svg> Ask Lola</button>
      </div>

      <!-- RIGHT: insights -->
      <div class="col">
        <div class="card">
          <h3>Lola noticed</h3>
          <div id="insights"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="sidebar.js"></script>
<script>
// ════════ THE LIVING ATOM ════════
const cv=document.getElementById('atom'), x=cv.getContext('2d');
const C=360; let t=0, energy=0, energyTarget=0, flare=0, mode='alive';
// 3 electron orbits (ellipses at different tilts)
const orbits=[ {rx:130,ry:54,rot:0,sp:1.4,e:[0,Math.PI]},
               {rx:130,ry:54,rot:Math.PI/3,sp:-1.1,e:[Math.PI/2]},
               {rx:130,ry:54,rot:-Math.PI/3,sp:1.7,e:[Math.PI*1.3]} ];
function col(a){ // color shifts by mode
  if(mode==='alert') return `rgba(255,176,32,${a})`;     // gold flare
  if(mode==='insight') return `rgba(166,75,255,${a})`;   // violet
  return `rgba(255,45,142,${a})`;                         // pink alive
}
function draw(){
  t+=0.016; energy+=(energyTarget-energy)*0.08; flare*=0.94;
  x.clearRect(0,0,720,720);
  const cx=360,cy=360;
  const pulse=1+Math.sin(t*2)*0.04+energy*0.2+flare*0.4;

  // glow
  const gl=x.createRadialGradient(cx,cy,20,cx,cy,260*pulse);
  gl.addColorStop(0,col(0.18+flare*0.4)); gl.addColorStop(1,col(0));
  x.fillStyle=gl; x.beginPath(); x.arc(cx,cy,260*pulse,0,7); x.fill();

  // orbit rings + electrons
  for(const o of orbits){
    x.save(); x.translate(cx,cy); x.rotate(o.rot+t*0.05);
    x.strokeStyle=col(0.12); x.lineWidth=1;
    x.beginPath(); x.ellipse(0,0,o.rx*pulse,o.ry*pulse,0,0,7); x.stroke();
    for(const e0 of o.e){
      const a=e0+t*o.sp;
      const ex=Math.cos(a)*o.rx*pulse, ey=Math.sin(a)*o.ry*pulse;
      const eg=x.createRadialGradient(ex,ey,0,ex,ey,12);
      eg.addColorStop(0,col(0.9)); eg.addColorStop(1,col(0));
      x.fillStyle=eg; x.beginPath(); x.arc(ex,ey,12,0,7); x.fill();
      x.fillStyle=col(1); x.beginPath(); x.arc(ex,ey,3,0,7); x.fill();
    }
    x.restore();
  }

  // nucleus
  const nr=(34+Math.sin(t*3)*4)*pulse;
  const nuc=x.createRadialGradient(cx-8,cy-8,2,cx,cy,nr);
  nuc.addColorStop(0,'rgba(255,255,255,.95)');
  nuc.addColorStop(0.4,col(0.95));
  nuc.addColorStop(1,col(0.2));
  x.fillStyle=nuc; x.beginPath(); x.arc(cx,cy,nr,0,7); x.fill();

  requestAnimationFrame(draw);
}
draw();

function setState(m,state,sub){ mode=m;
  if(state) document.getElementById('atomState').textContent=state;
  if(sub) document.getElementById('atomSub').textContent=sub;
  if(m==='alert'){ flare=1; energyTarget=0.6; setTimeout(()=>{mode='alive';energyTarget=0;},2600); }
  if(m==='insight'){ energyTarget=0.4; }
}

// ════════ POLL NOTIFICATIONS (the nervous system) ════════
const TENANT='mma'; let lastTop='';
async function poll(){
  try{
    const r=await fetch('/api/notifications?tenant='+TENANT);
    const d=await r.json();
    // KPIs
    if(d.counts){ document.getElementById('kB').textContent=d.counts.bookings??0;
      document.getElementById('kC').textContent=d.counts.calls??0;
      document.getElementById('kL').textContent=d.counts.leads??0; }
    // feed
    const feed=document.getElementById('feed');
    const ev=d.events||[];
    const topKey=ev[0]?(ev[0].title+ev[0].when):'';
    const isNew = topKey && topKey!==lastTop && lastTop!=='';
    feed.innerHTML = ev.map((e,i)=>`<div class="evt ${isNew&&i===0?'fresh':''}">
      <div class="ic">${icon(e.icon)}</div>
      <div class="tx"><div class="tt">${e.title}</div><div class="wn">${e.when||''}</div></div></div>`).join('') || '<div class="atom-sub">Quiet for now.</div>';
    if(isNew){ setState('alert','Something just came in', ev[0].title); }
    lastTop=topKey;
    // insights
    const ins=d.insights||[];
    document.getElementById('insights').innerHTML = ins.length? ins.map(i=>
      `<div class="insight ${i.level==='warn'?'warn':'info'}"><div class="b"></div><p>${i.text}</p></div>`).join('')
      : '<div class="atom-sub">Nothing needs you right now.</div>';
    if(ins.some(i=>i.level==='warn')) setState('insight','Lola has something for you','tap to hear it');
  }catch(e){}
}
function icon(name){
  const ic={calendar:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>',
    phone:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.96.36 1.9.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.91.34 1.85.57 2.81.7A2 2 0 0 1 22 16.92z"/></svg>',
    user:'<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>'};
  return ic[name]||ic.calendar;
}
poll(); setInterval(poll, 8000);

// ════════ ASK LOLA (tap atom or button -> voice) ════════
document.getElementById('stage').addEventListener('click', openVoice);
document.getElementById('ask').addEventListener('click', openVoice);
function openVoice(){ window.location.href='/lola-live'; }
</script>
</body>
</html>
