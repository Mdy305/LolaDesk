<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Inbox — LolaDesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
<style>
.inbox-layout{display:grid;grid-template-columns:340px 1fr;gap:16px;height:calc(100vh - 180px);min-height:480px}
@media(max-width:900px){.inbox-layout{grid-template-columns:1fr;height:auto}}
.thread-list{overflow-y:auto}
.thread{display:flex;gap:12px;padding:14px 16px;border-bottom:0.5px solid var(--border);cursor:pointer;transition:background .12s}
.thread:hover,.thread.active{background:var(--surface2)}
.thread-body{flex:1;min-width:0}
.thread-top{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:2px}
.thread-name{font-size:13px;font-weight:500}
.thread-time{font-size:10px;color:var(--text3);flex-shrink:0}
.thread-msg{font-size:12px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ch{font-size:9px;font-weight:500;padding:1px 6px;border-radius:4px}
.ch-instagram{background:rgba(225,48,108,.15);color:#ff6bb0}
.ch-sms{background:var(--green-dim);color:var(--green)}
.ch-whatsapp{background:rgba(37,211,102,.15);color:#25d366}
.ch-email{background:var(--blue-dim);color:var(--blue)}
.conv{display:flex;flex-direction:column}
.conv-head{display:flex;align-items:center;gap:12px;padding:16px 18px;border-bottom:0.5px solid var(--border)}
.conv-msgs{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px}
.bubble{max-width:75%;font-size:13.5px;line-height:1.5;padding:10px 14px;border-radius:14px}
.bubble.them{align-self:flex-start;background:var(--surface2);border-bottom-left-radius:3px}
.bubble.us{align-self:flex-end;background:var(--pink-dim);border-bottom-right-radius:3px}
.bubble-meta{font-size:10px;color:var(--text3);margin-top:4px}
.lola-tag{font-size:9px;color:var(--pink2);font-weight:600;margin-left:6px}
.conv-input{display:flex;gap:10px;padding:14px 18px;border-top:0.5px solid var(--border)}
.conv-input input{flex:1;background:var(--surface2);border:0.5px solid var(--border);border-radius:24px;padding:11px 16px;color:var(--text);font-size:13.5px;outline:none}
.conv-input input:focus{border-color:var(--pink)}
.send{width:40px;height:40px;border-radius:50%;background:var(--pink);color:#fff;display:flex;align-items:center;justify-content:center}
.auto-note{text-align:center;font-size:11px;color:var(--text3);padding:6px}
</style>
</head>
<body data-page="inbox">
<div class="app">
  <main class="main">
    <div class="topbar">
      <div class="page-head">
        <h1 class="page-title">Inbox</h1>
        <p class="page-sub">Every channel, one place. Lola replies in seconds.</p>
      </div>
    </div>

    <div class="inbox-layout">
      <div class="card thread-list" id="threads"></div>
      <div class="card conv">
        <div class="conv-head" id="convHead"></div>
        <div class="conv-msgs" id="convMsgs"></div>
        <div class="conv-input">
          <input id="reply" placeholder="Type a reply, or let Lola handle it…"/>
          <button class="send" onclick="sendReply()"><svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 19V5M5 12l7-7 7 7"/></svg></button>
        </div>
      </div>
    </div>
  </main>
</div>

<script src="auth-guard.js"></script>
<script src="lola-data.js"></script>
<script src="sidebar.js"></script>
<script>
let THREADS = [];

let active = 0;
function initial(n){ return (n.match(/[A-Za-z]/)||['#'])[0].toUpperCase(); }
function av(t,sz){ return `<span class="av ${sz||''}"><span class="av-initial">${initial(t.name)}</span>${t.img?`<img src="${t.img}" onerror="this.style.opacity=0">`:''}</span>`; }

function renderThreads(){
  document.getElementById('threads').innerHTML = THREADS.map((t,i)=>`
    <div class="thread ${i===active?'active':''}" onclick="openThread(${i})">
      ${av(t,'')}
      <div class="thread-body">
        <div class="thread-top"><span class="thread-name">${t.name}</span><span class="thread-time">${t.time}</span></div>
        <div class="thread-msg">${t.preview}</div>
        <span class="ch ch-${t.ch}" style="margin-top:5px;display:inline-block">${t.ch}</span>
      </div>
    </div>`).join('');
}
function openThread(i){ active=i; renderThreads(); renderConv(); }
function renderConv(){
  const t = THREADS[active];
  document.getElementById('convHead').innerHTML = `${av(t,'')}<div><div style="font-weight:600;font-size:14px">${t.name}</div><div style="font-size:11px;color:var(--text3)"><span class="ch ch-${t.ch}">${t.ch}</span></div></div>`;
  document.getElementById('convMsgs').innerHTML = t.msgs.map(([who,txt,time,lola])=>`
    <div class="bubble ${who}">${txt}<div class="bubble-meta">${time}${lola?'<span class="lola-tag">· Lola</span>':''}</div></div>`).join('')
    + `<div class="auto-note">Lola is handling this conversation automatically</div>`;
  const m = document.getElementById('convMsgs'); m.scrollTop = m.scrollHeight;
}
function sendReply(){
  const inp = document.getElementById('reply');
  if(!inp.value.trim()) return;
  THREADS[active].msgs.push(['us', inp.value.trim(), 'now', false]);
  inp.value=''; renderConv();
}
document.getElementById('reply').addEventListener('keydown',e=>{ if(e.key==='Enter') sendReply(); });
(async ()=>{
  const data = await LolaData.load('inbox');
  const list = (data && data.threads) || [];
  THREADS = list.map(t=>({ name:t.who||'Client', ch:t.channel||'sms', time:t.when||'', preview:t.preview||'', img:'', msgs: t.preview?[['them',t.preview,t.when||'',false]]:[] }));
  if(!THREADS.length){ document.getElementById('threads').innerHTML='<div style="padding:30px;text-align:center;color:var(--text3)">No messages yet.</div>'; }
  else { renderThreads(); renderConv(); }
})();
</script>
</body>
</html>
