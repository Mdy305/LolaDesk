<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Sign in — LolaDesk</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--surface:#101012;--surface2:#16161a;
  --border:#1c1c20;--border2:#28282e;
  --text:#f4f4f7;--text2:#9a9aa2;--text3:#56565e;
  --pink:#ccff00;--pink2:#ff6bb0;--pink-dim:rgba(204,255,0,.12);--pink-glow:rgba(204,255,0,.5);
  
  --ff-serif:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif;
  --ff:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--ff);-webkit-font-smoothing:antialiased;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;position:relative;overflow:hidden}
button{font-family:var(--ff);cursor:pointer;border:none}
input{font-family:var(--ff)}
a{color:inherit;text-decoration:none}

.bg-orb{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:760px;height:760px;pointer-events:none;opacity:.4;z-index:0}

.back{position:absolute;top:28px;left:32px;font-size:13px;color:var(--text2);display:flex;align-items:center;gap:7px;z-index:5;transition:color .2s}
.back:hover{color:var(--text)}

.card{position:relative;z-index:2;width:100%;max-width:400px;text-align:center}
.logo{font-size:18px;font-weight:600;letter-spacing:.2em;margin-bottom:8px}
.logo-sub{font-size:9px;letter-spacing:.42em;color:var(--text3);margin-bottom:48px}

/* VOICE ORB */
.voice-orb{width:180px;height:180px;margin:0 auto 28px;position:relative;cursor:pointer;transition:transform .3s}
.voice-orb:hover{transform:scale(1.04)}
.voice-orb canvas{position:absolute;inset:0}
.voice-orb-label{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500;letter-spacing:.26em;text-indent:.26em}

.voice-title{font-family:var(--ff-serif);font-size:30px;font-style:italic;font-weight:300;margin-bottom:8px}
.voice-state{font-size:13px;color:var(--text3);min-height:20px;margin-bottom:8px;transition:color .3s}
.voice-state.listening{color:var(--pink2)}
.voice-transcript{font-size:13px;font-style:italic;color:var(--pink2);min-height:18px;margin-bottom:24px}

.divider{display:flex;align-items:center;gap:14px;margin:28px 0;color:var(--text3);font-size:11px;letter-spacing:.1em}
.divider::before,.divider::after{content:'';flex:1;height:0.5px;background:var(--border)}

.field{margin-bottom:12px;text-align:left}
.label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block}
.input{width:100%;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;padding:13px 16px;color:var(--text);font-size:14px;outline:none;transition:border-color .15s}
.input:focus{border-color:var(--pink)}
.input::placeholder{color:var(--text3)}

.btn{width:100%;padding:14px;border-radius:100px;font-size:14px;font-weight:600;transition:all .2s;margin-top:8px}
.btn-primary{background:var(--pink);color:#fff}
.btn-primary:hover{background:var(--pink2);box-shadow:0 4px 20px var(--pink-glow)}
.btn-google{background:var(--surface);color:var(--text);border:0.5px solid var(--border2);display:flex;align-items:center;justify-content:center;gap:10px}
.btn-google:hover{border-color:var(--text3)}

.foot{font-size:13px;color:var(--text3);margin-top:24px}
.foot a{color:var(--pink2)}
</style>
<style>
/* ═══ VOLT CONTRAST — neon surfaces take dark ink, Apple-style ═══ */
.btn-primary, .price-btn.primary, .pcta.primary, .buy-btn, .ob-btn,
.connect-btn, .btn.btn-primary { color:#10140a !important; }

.snd,.me{color:#10140a}</style>
<style>
/* ghost variants stay light-ink (they sit on dark, not on volt) */
.btn-ghost, .ob-btn-ghost, .ob-btn.ob-btn-ghost, .price-btn.ghost { color: var(--text, #f5f6f0) !important; }
</style>
</head>
<body>

<canvas class="bg-orb" id="bgOrb" width="760" height="760"></canvas>

<a href="landing.html" class="back">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg>
  Back
</a>

<div class="card">
  <div class="logo">LOLADESK</div>
  <div class="logo-sub">AI FRONT DESK</div>

  <div class="voice-orb" id="voiceOrb" onclick="toggleVoice()" role="button" tabindex="0" aria-label="Tap to sign in by voice">
    <canvas id="orbCanvas" width="180" height="180"></canvas>
    <div class="voice-orb-label">LOLA</div>
  </div>

  <div class="voice-title">Welcome back.</div>
  <div class="voice-state" id="voiceState">Tap Lola and say "sign me in"</div>
  <div class="voice-transcript" id="voiceTranscript"></div>

  <div class="divider">OR</div>

  <div class="field">
    <label class="label">Email</label>
    <input class="input" id="email" type="email" placeholder="you@salon.com" autocomplete="email"/>
  </div>
  <div class="field">
    <label class="label">Password</label>
    <input class="input" id="password" type="password" placeholder="••••••••" autocomplete="current-password"/>
  </div>
  <button class="btn btn-primary" onclick="signIn()">Sign in</button>
  <button class="btn btn-google" onclick="signIn()">
    <svg width="17" height="17" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.5 12.2c0-.8-.1-1.5-.2-2.2H12v4.3h5.9c-.3 1.4-1 2.5-2.2 3.3v2.8h3.6c2.1-1.9 3.2-4.8 3.2-8.2z"/><path fill="#34A853" d="M12 23c2.9 0 5.4-1 7.2-2.6l-3.6-2.8c-1 .7-2.3 1.1-3.6 1.1-2.8 0-5.1-1.9-6-4.4H2.3v2.9C4.1 20.6 7.8 23 12 23z"/><path fill="#FBBC05" d="M6 14.3c-.2-.7-.4-1.4-.4-2.3s.1-1.6.4-2.3V6.8H2.3C1.5 8.3 1 10.1 1 12s.5 3.7 1.3 5.2L6 14.3z"/><path fill="#EA4335" d="M12 5.4c1.6 0 3 .5 4.1 1.6l3.1-3.1C17.4 2.1 14.9 1 12 1 7.8 1 4.1 3.4 2.3 6.8L6 9.7c.9-2.5 3.2-4.3 6-4.3z"/></svg>
    Continue with Google
  </button>

  <div class="foot">New here? <a href="onboarding.html">Set up your salon →</a></div>
</div>

<script src="lola-orb.js"></script>
<script>
// ── orb — the same neural particle Lola as the dashboard ──
// One Lola everywhere: identical engine, so the Lola an owner meets at
// sign-in IS the Lola on their dashboard. Legacy renderer kept only as
// a fallback if lola-orb.js somehow failed to load.
function makeOrb(canvas, size, getActive){
  if(window.LolaOrb){
    const inst = LolaOrb.mount(canvas, { size });
    (function sync(){
      const want = (getActive && getActive()) ? 'listening' : 'ambient';
      if(inst.state !== want) inst.setState(want);
      requestAnimationFrame(sync);
    })();
    return inst;
  }
  const x = canvas.getContext('2d');
  const c = size/2; let t = Math.random()*10; const R = size*0.30;
  (function loop(){
    x.clearRect(0,0,size,size);
    const active = getActive && getActive();
    const breath = 0.5 + Math.sin(t*1.3)*0.5;
    const energy = active ? 1 : 0.32;
    x.globalCompositeOperation='lighter';
    const halo=x.createRadialGradient(c,c,size*0.04,c,c,size*0.49);
    const hA=0.10+breath*0.10+energy*0.12;
    halo.addColorStop(0,`rgba(204,255,0,${hA})`);halo.addColorStop(0.5,`rgba(204,255,0,${hA*0.35})`);halo.addColorStop(1,'rgba(204,255,0,0)');
    x.fillStyle=halo;x.fillRect(0,0,size,size);
    const core=x.createRadialGradient(c,c,0,c,c,size*0.26);
    const cA=0.22+breath*0.18+energy*0.2;
    core.addColorStop(0,`rgba(255,130,195,${cA})`);core.addColorStop(0.5,`rgba(204,255,0,${cA*0.5})`);core.addColorStop(1,'rgba(204,255,0,0)');
    x.fillStyle=core;x.fillRect(0,0,size,size);
    for(let i=0;i<64;i++){
      const a=(i/64)*Math.PI*2;
      const r=R+Math.sin(t*.8+i*.4)*size*0.03+Math.sin(t*1.4+i*.85)*size*0.016+(active?Math.sin(t*3+i)*size*0.04:0)+breath*size*0.012;
      const px=c+Math.cos(a)*r,py=c+Math.sin(a)*r;
      const al=0.25+Math.abs(Math.sin(t*.6+i*.3))*0.4+energy*0.2;
      const sz=size*0.008+Math.abs(Math.sin(t*.9+i))*size*0.006;
      x.beginPath();x.arc(px,py,sz,0,Math.PI*2);
      x.fillStyle=`rgba(255,${90+Math.sin(t+i*.2)*60},${175+Math.sin(t+i)*30},${al})`;x.fill();
    }
    for(let i=0;i<30;i++){
      const a=(i/30)*Math.PI*2+t*.25;
      const r=R*0.4+Math.sin(t*1.2+i*.55)*size*0.04;
      const px=c+Math.cos(a)*r,py=c+Math.sin(a)*r;
      x.beginPath();x.arc(px,py,size*0.006,0,Math.PI*2);
      x.fillStyle=`rgba(255,185,218,${0.2+Math.abs(Math.sin(t*.9+i))*0.32})`;x.fill();
    }
    x.globalCompositeOperation='source-over';
    t+=0.015;requestAnimationFrame(loop);
  })();
}
let listening=false;
makeOrb(document.getElementById('orbCanvas'),180,()=>listening);
makeOrb(document.getElementById('bgOrb'),760,()=>false);

// ── voice sign-in ──
let recognition=null;
function setupSR(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR)return;
  recognition=new SR();recognition.continuous=false;recognition.interimResults=true;recognition.lang='en-US';
  recognition.onresult=(e)=>{
    let txt='';for(let i=e.resultIndex;i<e.results.length;i++)txt+=e.results[i][0].transcript;
    document.getElementById('voiceTranscript').textContent=txt;
    if(e.results[e.results.length-1].isFinal){
      stopListening();
      // Voice biometric sign-in is NOT built yet. Never bypass auth here —
      // this previously set a demo token and let anyone reach the dashboard.
      document.getElementById('voiceState').textContent='Voice sign-in is coming soon — please sign in with your email and password below.';
    }
  };
  recognition.onerror=()=>stopListening();
  recognition.onend=()=>{ if(listening) stopListening(); };
}
function startListening(){
  if(!recognition)setupSR();
  if(!recognition){ alert('Voice needs Chrome, Edge or Safari. Use email below.'); return; }
  listening=true;
  document.getElementById('voiceState').textContent='Listening…';
  document.getElementById('voiceState').classList.add('listening');
  document.getElementById('voiceTranscript').textContent='';
  try{recognition.start();}catch(e){}
}
function stopListening(){
  listening=false;
  document.getElementById('voiceState').classList.remove('listening');
  if(recognition)try{recognition.stop();}catch(e){}
}
window.toggleVoice=()=> listening?stopListening():startListening();
document.getElementById('voiceOrb').addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' '){e.preventDefault();toggleVoice();}});

window.signIn=async ()=>{
  const email=(document.getElementById('email').value||'').trim();
  const password=document.getElementById('password').value||'';
  const stateEl=document.getElementById('voiceState');
  if(!email||!password){ stateEl.textContent='Enter your email and password.'; return; }
  stateEl.textContent='Signing you in…';
  try{
    const r=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({email,password})});
    const d=await r.json();
    if(!r.ok) throw new Error(d.error||'Login failed');
    if(d.session){
      localStorage.setItem('loladesk_token', d.session.access_token||'');
      localStorage.setItem('loladesk_refresh', d.session.refresh_token||'');
      if(d.tenant) localStorage.setItem('loladesk_tenant_id', d.tenant.id||'');
    }
    const next = new URLSearchParams(location.search).get('next');
    if(!d.tenant){
      window.location.href = 'onboarding.html';
      return;
    }
    window.location.href = next ? decodeURIComponent(next) : 'dashboard.html';
  }catch(e){ stateEl.textContent = e.message||'Invalid email or password'; }
};
document.getElementById('password').addEventListener('keydown',e=>{ if(e.key==='Enter') signIn(); });
setupSR();
  // Prefill email when arriving from onboarding (returning user).
  try{
    const qp = new URLSearchParams(location.search).get('email');
    if(qp){ const el = document.getElementById('email'); if(el) el.value = qp; const pw = document.querySelector('input[type=password]'); if(pw) pw.focus(); }
  }catch(e){}
</script>
</body>
</html>
