<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Page not found — LolaDesk</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="robots" content="noindex">
<style>
  
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
       min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .orb{width:96px;height:96px;border-radius:50%;margin:0 auto 28px;
       background:radial-gradient(circle at 32% 30%,#e6ff85,#ccff00 55%,#3a5a00);
       box-shadow:0 12px 50px rgba(204,255,0,.45);animation:breathe 3.2s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
  h1{font-size:clamp(26px,5vw,40px);font-weight:700;letter-spacing:-.02em;margin-bottom:12px}
  h1 em{color:var(--pink);font-style:normal}
  p{color:var(--muted);font-size:16px;line-height:1.6;max-width:420px;margin:0 auto 30px}
  .btn{display:inline-block;background:linear-gradient(135deg,#ccff00,#8fd400);color:#10140a;text-decoration:none;
       padding:14px 30px;border-radius:14px;font-weight:600;font-size:15px;
       transition:transform .25s cubic-bezier(.22,1,.36,1),box-shadow .25s}
  .btn:hover{transform:translateY(-2px);box-shadow:0 10px 34px rgba(204,255,0,.4)}
  .sub{margin-top:16px;font-size:13px}
  .sub a{color:var(--pink2);text-decoration:none}
  @media (prefers-reduced-motion: reduce){.orb{animation:none}.btn{transition:none}}
</style>
<style>


.snd,.me{color:#10140a}</style>

  <div class="orb" aria-hidden="true"></div>

  <a class="btn" href="/">Back to LolaDesk</a>
  <div class="sub">Looking for your dashboard? <a href="/login">Sign in</a></div>
</main>
<script src="app.js"></script>
</body>
</html>
