<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Team — LolaDesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
<style>
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.member{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:22px;transition:border-color .15s;cursor:pointer}
.member:hover{border-color:var(--border2)}
.member-top{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.member-name{font-size:16px;font-weight:600}
.member-role{font-size:12px;color:var(--text3)}
.member-rev{font-size:26px;font-weight:600;margin-bottom:4px}
.member-change{font-size:12px;font-weight:500;margin-bottom:16px}
.member-change.up{color:var(--green)}
.member-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:14px}
.member-bar-fill{height:100%;background:linear-gradient(90deg,#ff2d8e,#ff6bb0);border-radius:3px}
.member-stats{display:flex;gap:18px}
.member-stat-val{font-size:15px;font-weight:600}
.member-stat-label{font-size:11px;color:var(--text3)}
</style>
</head>
<body data-page="team">
<div class="app">
  <main class="main">
    <div class="topbar">
      <div class="page-head">
        <h1 class="page-title">Team</h1>
        <p class="page-sub">Your stylists — and how Lola keeps their chairs full.</p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>Add stylist</button>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="kpi-val">$53,200</div><div class="kpi-label">Team revenue</div><div class="kpi-sub green" style="color:var(--green)">↑ 15% this month</div></div>
      <div class="kpi"><div class="kpi-val">4</div><div class="kpi-label">Stylists</div><div class="kpi-sub">All active</div></div>
      <div class="kpi"><div class="kpi-val">87%</div><div class="kpi-label">Chair utilization</div><div class="kpi-sub">↑ 9%</div></div>
      <div class="kpi"><div class="kpi-val pink">312</div><div class="kpi-label">Appointments</div><div class="kpi-sub">Lola booked 81%</div></div>
    </div>

    <div class="team-grid" id="teamGrid"></div>
  </main>
</div>

<script src="sidebar.js"></script>
<script>
const TEAM = [
  { name:'Meddy', role:'Owner · Master Colorist', img:'https://images.unsplash.com/photo-1580489944761-15a19d654956?w=120&q=80', rev:22800, change:18, pct:100, clients:94, rating:4.9 },
  { name:'Alice', role:'Senior Stylist', img:'https://images.unsplash.com/photo-1487412720507-e7ab37603c6f?w=120&q=80', rev:13200, change:14, pct:58, clients:67, rating:4.8 },
  { name:'Michelle', role:'Color Specialist', img:'https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=120&q=80', rev:9400, change:11, pct:41, clients:52, rating:4.9 },
  { name:'Samantha', role:'Stylist', img:'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=120&q=80', rev:7800, change:9, pct:34, clients:41, rating:4.7 }
];
function initial(n){ return (n.match(/[A-Za-z]/)||['?'])[0].toUpperCase(); }
function av(m){ return `<span class="av lg"><span class="av-initial">${initial(m.name)}</span>${m.img?`<img src="${m.img}" onerror="this.style.opacity=0">`:''}</span>`; }
document.getElementById('teamGrid').innerHTML = TEAM.map(m=>`
  <div class="member">
    <div class="member-top">${av(m)}<div><div class="member-name">${m.name}</div><div class="member-role">${m.role}</div></div></div>
    <div class="member-rev">$${m.rev.toLocaleString()}</div>
    <div class="member-change up">↑ ${m.change}% this month</div>
    <div class="member-bar"><div class="member-bar-fill" style="width:${m.pct}%"></div></div>
    <div class="member-stats">
      <div><div class="member-stat-val">${m.clients}</div><div class="member-stat-label">Clients</div></div>
      <div><div class="member-stat-val">★ ${m.rating}</div><div class="member-stat-label">Rating</div></div>
    </div>
  </div>`).join('');
</script>
</body>
</html>
