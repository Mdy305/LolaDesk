<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Team — LolaDesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,200;1,300;1,400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
<style>
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.member{background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:22px;transition:border-color .15s;cursor:pointer}
.member:hover{border-color:var(--border2)}
.member-top{display:flex;align-items:center;gap:13px;margin-bottom:18px}
.member-name{font-size:16px;font-weight:600}
.member-role{font-size:12px;color:var(--text3)}
.member-rev{font-size:26px;font-weight:600;margin-bottom:4px}
.member-change{font-size:12px;font-weight:500;margin-bottom:16px}
.member-change.up{color:var(--text)}
.member-bar{height:6px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:14px}
.member-bar-fill{height:100%;background:linear-gradient(90deg,#ff2d8e,#ff6bb0);border-radius:3px}
.member-stats{display:flex;gap:18px}
.member-stat-val{font-size:15px;font-weight:600}
.member-stat-label{font-size:11px;color:var(--text3)}
</style>
</head>
<body data-page="team">
<div class="app">
  <main class="main">
    <div class="topbar">
      <div class="page-head">
        <h1 class="page-title">Team</h1>
        <p class="page-sub">Your stylists — and how Lola keeps their chairs full.</p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>Add stylist</button>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="kpi-val" id="kpiRev">—</div><div class="kpi-label">Team revenue</div><div class="kpi-sub green" style="color:var(--text)">↑ this month</div></div>
      <div class="kpi"><div class="kpi-val" id="kpiCount">—</div><div class="kpi-label">Stylists</div><div class="kpi-sub">All active</div></div>
      <div class="kpi"><div class="kpi-val" id="kpiUtil">—</div><div class="kpi-label">Avg utilization</div><div class="kpi-sub">↑ 9%</div></div>
      <div class="kpi"><div class="kpi-val pink" id="kpiAppts">—</div><div class="kpi-label">Appointments</div><div class="kpi-sub">Last 30 days</div></div>
    </div>

    <div class="team-grid" id="teamGrid"></div>
  </main>
</div>

<script src="auth-guard.js"></script>
<script src="lola-data.js"></script>
<script src="sidebar.js"></script>
<script>
let TEAM = [];
function initial(n){ return (n.match(/[A-Za-z]/)||['?'])[0].toUpperCase(); }
function av(m){ return `<span class="av lg"><span class="av-initial">${initial(m.name)}</span>${m.img?`<img src="${m.img}" onerror="this.style.opacity=0">`:''}</span>`; }
function renderTeam(){ document.getElementById('teamGrid').innerHTML = TEAM.map(m=>`
  <div class="member">
    <div class="member-top">${av(m)}<div><div class="member-name">${m.name}</div><div class="member-role">${m.role}</div></div></div>
    <div class="member-rev">$${m.rev.toLocaleString()}</div>
    <div class="member-change up">↑ ${m.change}% this month</div>
    <div class="member-bar"><div class="member-bar-fill" style="width:${m.pct}%"></div></div>
    <div class="member-stats">
      <div><div class="member-stat-val">${m.clients}</div><div class="member-stat-label">Clients</div></div>
      <div><div class="member-stat-val">★ ${m.rating}</div><div class="member-stat-label">Rating</div></div>
    </div>
  </div>`).join(''); }
(async ()=>{
  const data = await LolaData.load('team');
  const list = (data && data.team) || [];
  TEAM = list.map((m,i)=>({ name:m.name||'Team member', role:m.role||'Stylist', img:'', rev:m.rev||0, change:m.change||0, pct:m.pct||(100-i*20), clients:m.clients||0, rating:m.rating||4.8 }));
  renderTeam();

  if(data && data.kpis){
    document.getElementById('kpiRev').textContent = '$' + (data.kpis.totalRev || 0).toLocaleString();
    document.getElementById('kpiCount').textContent = list.length;
    document.getElementById('kpiUtil').textContent = (data.kpis.totalUtil || 0) + '%';
    document.getElementById('kpiAppts').textContent = (data.kpis.totalAppts || 0).toLocaleString();
  }
})();
</script>
</body>
</html>
