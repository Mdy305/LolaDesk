<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Clients — LolaDesk</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Cormorant+Garamond:ital,wght@0,300;1,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="app.css"/>
<style>
.search-row{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.search-box{flex:1;min-width:220px;display:flex;align-items:center;gap:10px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);padding:11px 16px}
.search-box input{flex:1;background:none;border:none;outline:none;color:var(--text);font-size:14px}
.search-box input::placeholder{color:var(--text3)}
.filter-pill{padding:11px 16px;background:var(--surface);border:0.5px solid var(--border);border-radius:var(--r);font-size:13px;color:var(--text2);cursor:pointer;transition:all .15s}
.filter-pill.active{background:var(--pink-dim);border-color:transparent;color:var(--pink2)}
.cell-name{display:flex;align-items:center;gap:12px}
.cell-name-txt{font-weight:500}
.cell-sub{font-size:11px;color:var(--text3)}
</style>
</head>
<body data-page="clients">
<div class="app">
  <main class="main">
    <div class="topbar">
      <div class="page-head">
        <h1 class="page-title">Clients</h1>
        <p class="page-sub">Everyone Lola knows — and remembers.</p>
      </div>
      <div class="topbar-actions">
        <button class="btn btn-primary"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 5v14M5 12h14"/></svg>Add client</button>
      </div>
    </div>

    <div class="kpis">
      <div class="kpi"><div class="kpi-val">1,284</div><div class="kpi-label">Total clients</div><div class="kpi-sub">All time</div></div>
      <div class="kpi"><div class="kpi-val pink">86</div><div class="kpi-label">VIP clients</div><div class="kpi-sub">Top spenders</div></div>
      <div class="kpi"><div class="kpi-val green">42</div><div class="kpi-label">New this month</div><div class="kpi-sub">↑ 18%</div></div>
      <div class="kpi"><div class="kpi-val amber" style="color:var(--amber)">23</div><div class="kpi-label">Due for rebooking</div><div class="kpi-sub">Lola is on it</div></div>
    </div>

    <div class="search-row">
      <div class="search-box">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--text3)"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
        <input id="search" placeholder="Search clients by name, phone, or service…"/>
      </div>
      <div class="filter-pill active" onclick="filterBy(this,'all')">All</div>
      <div class="filter-pill" onclick="filterBy(this,'vip')">VIP</div>
      <div class="filter-pill" onclick="filterBy(this,'due')">Due to rebook</div>
    </div>

    <div class="card">
      <table class="tbl">
        <thead>
          <tr><th>Client</th><th>Preferred service</th><th>Lifetime value</th><th>Last visit</th><th>Status</th></tr>
        </thead>
        <tbody id="rows"></tbody>
      </table>
    </div>
  </main>
</div>

<script src="sidebar.js"></script>
<script>
const CLIENTS = [
  { name:'Jennifer Adams', img:'https://images.unsplash.com/photo-1488426862026-3ee34a7d66df?w=80&q=80', service:'Balayage, Extensions', ltv:14250, last:'May 22', vip:true, due:false },
  { name:'Valentina Rossi', img:'https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=80&q=80', service:'Balayage', ltv:9820, last:'Apr 2', vip:true, due:true },
  { name:'Amanda Davis', img:'https://images.unsplash.com/photo-1438761681033-6461ffad8d80?w=80&q=80', service:'Color Correction', ltv:6400, last:'Jun 1', vip:false, due:false },
  { name:'Sophie Wilson', img:'https://images.unsplash.com/photo-1531123897727-8f129e1688ce?w=80&q=80', service:'Blowout', ltv:3120, last:'May 28', vip:false, due:false },
  { name:'Rachel Smith', img:'https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=80&q=80', service:'Extensions', ltv:11200, last:'Mar 15', vip:true, due:true },
  { name:'Emily Johnson', img:'https://images.unsplash.com/photo-1554151228-14d9def656e4?w=80&q=80', service:'Hair Botox', ltv:4750, last:'May 12', vip:false, due:false },
  { name:'Olivia Brown', img:'', service:'Cut & Style', ltv:2890, last:'Jun 8', vip:false, due:false },
  { name:'Camila Santos', img:'', service:'Keratin', ltv:5240, last:'Apr 20', vip:false, due:true }
];

let activeFilter = 'all';
function initial(n){ return (n.match(/[A-Za-z]/)||['?'])[0].toUpperCase(); }
function avatar(c){
  return `<span class="av"><span class="av-initial">${initial(c.name)}</span>${c.img?`<img src="${c.img}" alt="" onerror="this.style.opacity=0">`:''}</span>`;
}
function render(){
  const q = (document.getElementById('search').value||'').toLowerCase();
  const rows = CLIENTS.filter(c=>{
    if(activeFilter==='vip' && !c.vip) return false;
    if(activeFilter==='due' && !c.due) return false;
    return c.name.toLowerCase().includes(q) || c.service.toLowerCase().includes(q);
  });
  document.getElementById('rows').innerHTML = rows.length ? rows.map(c=>`
    <tr onclick="openClient('${c.name.replace(/'/g,'')}')">
      <td><div class="cell-name">${avatar(c)}<div><div class="cell-name-txt">${c.name}</div></div>${c.vip?'<span class="pill vip" style="margin-left:4px">VIP</span>':''}</div></td>
      <td style="color:var(--text2)">${c.service}</td>
      <td style="font-weight:500">$${c.ltv.toLocaleString()}</td>
      <td style="color:var(--text2)">${c.last}</td>
      <td>${c.due?'<span class="pill amber">Due to rebook</span>':'<span class="pill green">Active</span>'}</td>
    </tr>`).join('') : '<tr><td colspan="5"><div class="empty">No clients match.</div></td></tr>';
}
function filterBy(el, f){
  document.querySelectorAll('.filter-pill').forEach(p=>p.classList.remove('active'));
  el.classList.add('active'); activeFilter=f; render();
}
function openClient(name){ window.location.href='dashboard.html'; }
document.getElementById('search').addEventListener('input', render);
render();
</script>
</body>
</html>
