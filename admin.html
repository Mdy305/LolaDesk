<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>LolaDesk — Command</title>
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<meta name="robots" content="noindex,nofollow">
<style>
:root{
  --bg:#0b0c08;--bg2:#121409;--surface:#171a0e;--border:rgba(255,255,255,.09);
  --text:#f5f6f0;--muted:#9aa38a;--volt:#ccff00;--volt2:#dcff66;--ink:#10140a;
  --ff:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',Helvetica,Arial,sans-serif;
  --spring:cubic-bezier(.22,1,.36,1);
}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--ff);min-height:100vh;
     padding:0 env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
.wrap{max-width:1080px;margin:0 auto;padding:44px 24px 90px;animation:in .5s var(--spring) both}
@keyframes in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
header{display:flex;align-items:center;gap:14px;margin-bottom:34px}
.orb{width:40px;height:40px;border-radius:50%;background:radial-gradient(circle at 32% 30%,#e6ff85,#ccff00 55%,#3a5a00);box-shadow:0 6px 26px rgba(204,255,0,.35)}
h1{font-size:24px;letter-spacing:-.02em;font-weight:700}
h1 small{color:var(--muted);font-weight:500;font-size:13px;display:block;letter-spacing:0}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:30px}
.kpi{background:var(--surface);border:0.5px solid var(--border);border-radius:16px;padding:18px;transition:transform .3s var(--spring)}
.kpi:hover{transform:translateY(-1px)}
.kpi b{display:block;font-size:26px;letter-spacing:-.02em;color:var(--volt)}
.kpi span{font-size:11.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}
.bar{display:flex;gap:10px;margin-bottom:14px}
input[type=search]{flex:1;background:var(--surface);border:0.5px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;font-size:14px;font-family:var(--ff);outline:none}
input[type=search]:focus{border-color:var(--volt);box-shadow:0 0 0 3px rgba(204,255,0,.14)}
.btn{background:var(--surface);border:0.5px solid var(--border);border-radius:12px;color:var(--text);padding:11px 16px;font-size:13px;cursor:pointer;font-family:var(--ff);transition:all .25s var(--spring)}
.btn:active{transform:scale(.97)}
table{width:100%;border-collapse:collapse;background:var(--bg2);border:0.5px solid var(--border);border-radius:16px;overflow:hidden}
th{font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);text-align:left;padding:12px 14px;border-bottom:0.5px solid var(--border)}
td{padding:12px 14px;font-size:13.5px;border-bottom:0.5px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr{transition:background .18s}
tbody tr:hover{background:rgba(255,255,255,.025)}
.pill{display:inline-block;padding:3px 10px;border-radius:99px;font-size:11px;font-weight:600}
.pill.trial{background:rgba(204,255,0,.12);color:var(--volt2)}
.pill.active{background:rgba(94,255,168,.14);color:#8affc4}
.pill.suspended{background:rgba(255,120,120,.13);color:#ffb3aa}
.act{background:none;border:0.5px solid var(--border);border-radius:10px;color:var(--muted);padding:6px 12px;font-size:12px;cursor:pointer;font-family:var(--ff)}
.act:hover{color:var(--volt);border-color:rgba(204,255,0,.4)}
.state{padding:60px 20px;text-align:center;color:var(--muted)}
.muted{color:var(--muted);font-size:12px}
@media (max-width:700px){ .hide-m{display:none} td,th{padding:10px 8px} }
@media (prefers-reduced-motion: reduce){ .wrap,.kpi,.btn{animation:none;transition:none} }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="orb"></div>
    <h1>Command<small>LolaDesk platform — every salon, one screen</small></h1>
  </header>

  <div class="grid" id="kpis"></div>

  <div class="bar">
    <input type="search" id="q" placeholder="Search salons, owners, numbers…">
    <button class="btn" onclick="load()">Refresh</button>
  </div>

  <div id="tableWrap"><div class="state">Loading…</div></div>
</div>

<script>
const token = localStorage.getItem('loladesk_token') || '';
let DATA = null;

function esc(s){ return String(s??'').replace(/[&<>"]/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
function fmtDate(d){ try{ return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric'});}catch(e){return ''} }

async function load(){
  const wrap = document.getElementById('tableWrap');
  try{
    const r = await fetch('/api/admin', { headers:{ Authorization:'Bearer '+token } });
    if(r.status === 401){ location.href = '/login'; return; }
    if(r.status === 403){ wrap.innerHTML = '<div class="state">This screen is for the platform operator.<br><span class="muted">Your account isn\'t on the admin list.</span></div>'; document.getElementById('kpis').innerHTML=''; return; }
    DATA = await r.json();
    renderKpis(); renderTable();
  }catch(e){ wrap.innerHTML = '<div class="state">Couldn\'t reach the platform API — try Refresh.</div>'; }
}

function renderKpis(){
  const m = DATA.metrics;
  const paying = (m.by_status.active||0);
  document.getElementById('kpis').innerHTML = [
    ['Salons', m.tenants], ['Paying', paying], ['Trials', m.by_status.trial||0],
    ['Bookings today', m.bookings_today], ['Messages today', m.messages_today], ['Calls today', m.calls_today]
  ].map(([l,v])=>`<div class="kpi"><b>${v}</b><span>${l}</span></div>`).join('');
}

function renderTable(){
  const q = (document.getElementById('q').value||'').toLowerCase();
  const rows = DATA.tenants.filter(t =>
    !q || [t.name,t.slug,t.owner_email,t.phone_number].join(' ').toLowerCase().includes(q));
  document.getElementById('tableWrap').innerHTML = rows.length ? `
  <table><thead><tr>
    <th>Salon</th><th class="hide-m">Owner</th><th class="hide-m">Line</th>
    <th>Plan</th><th>Status</th><th class="hide-m">Since</th><th></th>
  </tr></thead><tbody>` + rows.map(t => `
    <tr>
      <td><strong>${esc(t.name)}</strong><br><span class="muted">${esc(t.slug)}</span></td>
      <td class="hide-m">${esc(t.owner_email||'—')}</td>
      <td class="hide-m">${esc(t.phone_number||'—')}</td>
      <td>${esc(t.plan||'—')}</td>
      <td><span class="pill ${esc(t.billing_status||'trial')}">${esc(t.billing_status||'trial')}</span></td>
      <td class="hide-m muted">${fmtDate(t.created_at)}</td>
      <td>${t.billing_status==='suspended'
          ? `<button class="act" onclick="act('activate','${t.id}')">Activate</button>`
          : `<button class="act" onclick="act('suspend','${t.id}')">Suspend</button>`}</td>
    </tr>`).join('') + '</tbody></table>'
  : '<div class="state">No salons match.</div>';
}

async function act(action, id){
  if(action==='suspend' && !confirm('Suspend this salon? Their data stays intact — one click reactivates.')) return;
  const r = await fetch('/api/admin', { method:'POST',
    headers:{ 'Content-Type':'application/json', Authorization:'Bearer '+token },
    body: JSON.stringify({ action, tenant_id:id }) });
  if(r.ok) load();
}

document.getElementById('q').addEventListener('input', ()=> DATA && renderTable());
load();
</script>
</body>
</html>
