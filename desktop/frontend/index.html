<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Jarvis Lola OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050508;
    --text: #ffffff;
    --text-dim: rgba(255, 255, 255, 0.5);
    --border: rgba(255, 255, 255, 0.08);
    --pink: #ff2d8e;
    --glass-bg: rgba(20, 20, 25, 0.4);
    --glass-blur: blur(40px) saturate(180%);
    --spring: cubic-bezier(0.175, 0.885, 0.32, 1.15);
  }
  
  * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
  
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Spatial Mesh Aura (Reacts to Lola's state) ── */
  .mesh-aura {
    position: absolute;
    top: -50%; left: -50%; right: -50%; bottom: -50%;
    background: 
      radial-gradient(circle at 50% 50%, rgba(255,45,142,0.15) 0%, transparent 60%),
      radial-gradient(circle at 80% 20%, rgba(160,70,255,0.08) 0%, transparent 50%),
      radial-gradient(circle at 20% 80%, rgba(255,160,100,0.05) 0%, transparent 50%);
    filter: blur(80px);
    opacity: 0.6;
    z-index: 1;
    transition: opacity 1.5s ease, background 1.5s ease;
    animation: drift 20s ease-in-out infinite alternate;
  }

  @keyframes drift {
    0% { transform: translate(0%, 0%) scale(1); }
    100% { transform: translate(5%, 5%) scale(1.05); }
  }

  /* The Orb */
  .orb-container {
    position: relative;
    width: 700px;
    height: 700px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }
  #orb { width: 100%; height: 100%; pointer-events: none; }

  /* Cinematic Typewriter Transcript (Glassmorphic) */
  .transcript-container {
    position: absolute;
    bottom: 22%;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 20;
    width: 90%;
    max-width: 800px;
    padding: 24px 40px;
    border-radius: 24px;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    opacity: 0;
    transform: translateX(-50%) translateY(20px) scale(0.95);
    transition: opacity 0.8s var(--spring), transform 0.8s var(--spring);
    pointer-events: none;
  }
  
  .transcript-container.active {
    opacity: 1;
    transform: translateX(-50%) translateY(0) scale(1);
  }
  
  .transcript {
    font-size: 26px;
    font-weight: 300;
    letter-spacing: -0.02em;
    line-height: 1.4;
    color: var(--text);
  }
  
  .system-status {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--pink);
    margin-bottom: 8px;
    opacity: 0.8;
  }
  
  /* Spatial Control Dock */
  .dock {
    position: absolute;
    bottom: 40px;
    display: flex;
    gap: 16px;
    background: rgba(10, 10, 15, 0.6);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
    padding: 12px 24px;
    border-radius: 100px;
    z-index: 30;
  }

  .dock-btn {
    background: transparent;
    border: none;
    color: var(--text-dim);
    width: 48px;
    height: 48px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.4s var(--spring);
    position: relative;
  }

  .dock-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 50%;
    background: var(--text);
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .dock-btn svg {
    width: 22px;
    height: 22px;
    stroke-width: 1.5px;
    position: relative;
    z-index: 2;
  }

  .dock-btn:hover {
    color: var(--text);
    transform: scale(1.15) translateY(-4px);
  }
  
  .dock-btn:hover::before {
    opacity: 0.08;
  }
  
  .dock-btn:active {
    transform: scale(0.95);
  }

  .dock-btn.active {
    color: var(--pink);
    transform: scale(1.05);
  }
  .dock-btn.active::before {
    background: var(--pink);
    opacity: 0.15;
  }
  
  /* Top Bar */
  .top-bar {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    padding: 32px 48px;
    display: flex;
    justify-content: space-between;
    z-index: 20;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.15em;
    color: var(--text-dim);
    text-transform: uppercase;
  }
  
  .brand {
    color: var(--text);
    font-weight: 600;
    letter-spacing: 0.25em;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .brand-dot {
    width: 6px; height: 6px;
    background: var(--pink);
    border-radius: 50%;
    box-shadow: 0 0 10px var(--pink);
  }
  /* --- SPATIAL GLASS WINDOWS --- */
  .spatial-window {
    position: absolute;
    top: 50%;
    transform: translateY(-50%) scale(0.95);
    width: 380px;
    height: 500px;
    background: var(--glass-bg);
    backdrop-filter: var(--glass-blur);
    -webkit-backdrop-filter: var(--glass-blur);
    border: 1px solid var(--border);
    border-radius: 32px;
    box-shadow: 0 40px 80px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
    padding: 32px;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s var(--spring), transform 0.6s var(--spring);
    z-index: 25;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  
  .spatial-window.active {
    opacity: 1;
    pointer-events: all;
    transform: translateY(-50%) scale(1);
  }
  
  #winKnowledge { left: 40px; }
  #winCampaign { right: 40px; }
  
  .window-title {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--pink);
  }
  
  .window-desc {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.5;
  }
  
  .drop-zone {
    flex: 1;
    border: 1px dashed rgba(255,255,255,0.2);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    color: var(--text-dim);
    font-size: 13px;
    transition: all 0.3s ease;
    cursor: pointer;
  }
  
  .drop-zone:hover {
    background: rgba(255,255,255,0.05);
    border-color: var(--pink);
    color: var(--text);
  }
  
  .input-field {
    width: 100%;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(255,255,255,0.1);
    padding: 12px 16px;
    border-radius: 12px;
    color: var(--text);
    font-size: 14px;
    outline: none;
    transition: border 0.3s;
  }
  
  .input-field:focus {
    border-color: var(--pink);
  }
  
  .action-btn {
    width: 100%;
    background: var(--text);
    color: var(--bg);
    border: none;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s var(--spring);
  }
  .action-btn:active {
    transform: scale(0.95);
  }
</style>
<script type="text/javascript" src="/eel.js"></script>
</head>
<body>

<div class="mesh-aura" id="meshAura"></div>

<div class="top-bar">
  <div class="brand"><div class="brand-dot"></div> LolaDesk OS</div>
  <div id="clock">00:00</div>
</div>

<div class="orb-container">
  <canvas id="orb" width="700" height="700"></canvas>
</div>

<div class="transcript-container" id="transcriptBox">
  <div class="system-status" id="systemStatus">System</div>
  <div class="transcript" id="transcriptText">Initializing Neural Engine...</div>
</div>

<div class="dock">
  <button class="dock-btn" id="btnKnowledge" onclick="toggleWindow('winKnowledge')" title="Knowledge Base">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
  </button>
  <button class="dock-btn" id="btnAuth" onclick="triggerAuth()" title="Face Auth">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 20h14a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2z"/><path d="M12 12a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/><path d="M12 14c-4 0-6 2-6 2v2h12v-2s-2-2-6-2z"/></svg>
  </button>
  <button class="dock-btn" id="btnListen" onclick="triggerListen()" title="Microphone">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
  </button>
  <button class="dock-btn" id="btnCommand" onclick="triggerCommand()" title="Diagnostic Scan">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
  <button class="dock-btn" id="btnCampaign" onclick="toggleWindow('winCampaign')" title="Campaigns">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
  </button>
</div>

<!-- Knowledge Base Window -->
<div class="spatial-window" id="winKnowledge">
  <div class="window-title">Neural Knowledge</div>
  <div class="window-desc">Upload salon menus, contact lists, or policies to Lola's brain (.txt or .csv).</div>
  <label class="drop-zone" id="dropZone">
    <input type="file" id="fileUpload" style="display:none;" accept=".txt,.csv" onchange="handleFileUpload(event)">
    Click or drag file to ingest
  </label>
</div>

<!-- Campaign Manager Window -->
<div class="spatial-window" id="winCampaign">
  <div class="window-title">Campaign Engine</div>
  <div class="window-desc">Tell Lola what you want to promote. She will draft the SMS/Email using the Knowledge Base.</div>
  <textarea class="input-field" id="campaignPrompt" rows="4" placeholder="e.g. Draft a weekend promo for our new restorative hair mask..."></textarea>
  <button class="action-btn" onclick="draftCampaign()">Draft Campaign</button>
  <div class="window-desc" id="campaignResult" style="color: var(--text); flex:1; overflow-y:auto;"></div>
</div>

<script src="lola-orb.js"></script>
<script>
  let lola = null;
  if(window.LolaOrb) {
    lola = LolaOrb.mount(document.getElementById('orb'), { size: 700 });
    lola.setState('ambient');
  }

  const elBox = document.getElementById('transcriptBox');
  const elText = document.getElementById('transcriptText');
  const elStatus = document.getElementById('systemStatus');
  const elAura = document.getElementById('meshAura');
  
  function updateTranscript(status, text) {
    if(!text) {
      elBox.classList.remove('active');
      return;
    }
    elStatus.textContent = status;
    elText.textContent = text;
    elBox.classList.add('active');
  }

  // Aura colors based on state
  function updateAura(state) {
    if(state === 'listening') elAura.style.background = 'radial-gradient(circle at 50% 50%, rgba(200,50,255,0.2) 0%, transparent 60%)';
    else if(state === 'thinking') elAura.style.background = 'radial-gradient(circle at 50% 50%, rgba(255,160,100,0.15) 0%, transparent 60%)';
    else if(state === 'speaking') elAura.style.background = 'radial-gradient(circle at 50% 50%, rgba(255,255,255,0.15) 0%, transparent 60%)';
    else elAura.style.background = 'radial-gradient(circle at 50% 50%, rgba(255,45,142,0.15) 0%, transparent 60%)';
  }

  setTimeout(() => updateTranscript('',''), 2000);

  setInterval(() => {
    const d = new Date();
    document.getElementById('clock').textContent = 
      d.getHours().toString().padStart(2, '0') + ':' + d.getMinutes().toString().padStart(2, '0');
  }, 1000);

  eel.expose(js_lola_set_state);
  function js_lola_set_state(state) {
    if(lola) lola.setState(state);
    updateAura(state);
  }

  async function triggerListen() {
    const btn = document.getElementById('btnListen');
    btn.classList.add('active');
    updateTranscript('Microphone', "Listening to your request...");
    js_lola_set_state('listening');
    
    let res = await eel.py_start_listening()();
    btn.classList.remove('active');
    
    if(res) {
      updateTranscript('Processing', `"${res}"`);
      js_lola_set_state('thinking');
      let response = await eel.py_execute_command(res)();
      
      updateTranscript('Lola', response);
      js_lola_set_state('speaking');
      await eel.py_lola_speak(response)();
    }
    js_lola_set_state('ambient');
    setTimeout(() => updateTranscript('',''), 4000);
  }

  async function triggerAuth() {
    const btn = document.getElementById('btnAuth');
    btn.classList.add('active');
    updateTranscript('Security', "Authenticating via LBPH Vision...");
    js_lola_set_state('thinking');
    
    let res = await eel.py_face_auth()();
    btn.classList.remove('active');
    
    if(res) {
      updateTranscript('Security', "Identity verified. Welcome back.");
      js_lola_set_state('speaking');
    } else {
      updateTranscript('Security', "Authentication failed.");
      js_lola_set_state('ambient');
    }
    setTimeout(() => { js_lola_set_state('ambient'); updateTranscript('',''); }, 3000);
  }

  async function triggerCommand() {
    const btn = document.getElementById('btnCommand');
    btn.classList.add('active');
    updateTranscript('Vision AI', "Running diagnostic scan...");
    js_lola_set_state('thinking');
    
    let res = await eel.py_execute_command("Lola, run a diagnostic scan on my hair.")();
    btn.classList.remove('active');
    
    updateTranscript('Diagnostic Result', res);
    js_lola_set_state('speaking');
    await eel.py_lola_speak(res)();
    setTimeout(() => { js_lola_set_state('ambient'); updateTranscript('',''); }, 6000);
  }

  // --- Spatial Window Logic ---
  function toggleWindow(id) {
    const win = document.getElementById(id);
    if(win.classList.contains('active')) {
      win.classList.remove('active');
    } else {
      document.querySelectorAll('.spatial-window').forEach(w => w.classList.remove('active'));
      win.classList.add('active');
    }
  }

  async function handleFileUpload(event) {
    const file = event.target.files[0];
    if(!file) return;
    
    document.getElementById('dropZone').textContent = "Ingesting...";
    js_lola_set_state('thinking');
    
    const reader = new FileReader();
    reader.onload = async function(e) {
      const content = e.target.result;
      const res = await eel.py_upload_knowledge(file.name, content)();
      
      document.getElementById('dropZone').textContent = "Ingestion Complete";
      updateTranscript('Knowledge Base', res);
      js_lola_set_state('ambient');
      setTimeout(() => updateTranscript('',''), 4000);
    };
    reader.readAsText(file);
  }

  async function draftCampaign() {
    const prompt = document.getElementById('campaignPrompt').value;
    if(!prompt) return;
    
    document.getElementById('campaignResult').textContent = "Drafting with LLM...";
    js_lola_set_state('thinking');
    
    const res = await eel.py_draft_campaign(prompt)();
    document.getElementById('campaignResult').textContent = res;
    
    updateTranscript('Campaign Engine', "Campaign drafted successfully.");
    js_lola_set_state('ambient');
    setTimeout(() => updateTranscript('',''), 4000);
  }
</script>
</body>
</html>
